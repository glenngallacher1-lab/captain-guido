name: Security

# Run on every push, every PR, and once a week so new advisories land
# without anyone having to push a commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch: {}

# Workflow runs read-only by default. Each job opts in to what it needs.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. CodeQL static analysis (JavaScript / TypeScript) ────────────────
  codeql:
    name: CodeQL (javascript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload SARIF
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ── 2. Dependency review (PRs only — flags new vulnerable deps) ────────
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ── 3. npm audit on the server package ─────────────────────────────────
  npm-audit:
    name: npm audit (server)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install (no scripts, ignore lifecycle)
        working-directory: server
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Audit (production deps only, fail on high+)
        working-directory: server
        run: npm audit --omit=dev --audit-level=high

      - name: Outdated report (informational)
        working-directory: server
        run: npm outdated || true

  # ── 4. Gitleaks — scan repo + history for committed secrets ────────────
  secret-scan:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  # ── 5. Trivy filesystem scan — broad CVE/misconfig pass ────────────────
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # don't fail the run; results upload to Security tab

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  # ── 6. Static HTML/JS lint (no-deps) — catch obvious mistakes ──────────
  lint:
    name: Lint (HTML/CSS/JS sanity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: JS syntax check (root + server)
        run: |
          set -e
          for f in script.js server/server.js; do
            if [ -f "$f" ]; then
              echo "checking $f"
              node --check "$f"
            fi
          done

      - name: HTML structure check
        run: |
          npx --yes htmlhint --rules "tagname-lowercase=true,tag-pair=true,attr-no-duplication=true,id-unique=true" *.html || true
