<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captain Guido — Under Maintenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #01080f;
      color: #eef6ff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(78, 196, 196, 0.3);
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-20px) rotate(360deg); opacity: 0; }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #f4a836;
      box-shadow: 0 0 60px rgba(244, 168, 54, 0.35);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(244,168,54,0.3); }
      50%       { box-shadow: 0 0 80px rgba(244,168,54,0.6); }
    }

    .tag {
      color: #f4a836;
      font-size: 0.65rem;
      letter-spacing: 5px;
      border: 1px solid rgba(244,168,54,0.4);
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: 4px;
      line-height: 1.3;
      background: linear-gradient(135deg, #f4a836 0%, #eef6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: rgba(238,246,255,0.55);
      font-size: 0.9rem;
      letter-spacing: 1px;
      max-width: 420px;
      line-height: 1.8;
    }

    .wave {
      font-size: 1.8rem;
      animation: wave 2s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(-10deg); }
      50%       { transform: rotate(10deg); }
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f4a836, transparent);
    }

    .social {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .social a {
      color: rgba(238,246,255,0.45);
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-decoration: none;
      border: 1px solid rgba(244,168,54,0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .social a:hover {
      color: #f4a836;
      border-color: rgba(244,168,54,0.5);
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="content">
  <div class="wave">⚓</div>
  <img src="captain-character.png" alt="Captain Guido" class="logo">
  <div class="tag">UPDATING THE VOYAGE</div>
  <h1>WE'RE BACK<br>ON THE WATER SOON</h1>
  <div class="divider"></div>
  <p>The crew is making upgrades to the Hashwind. Check back shortly — the mission continues.</p>
  <div class="social">
    <a href="https://twitter.com/CaptainGuido" target="_blank">TWITTER</a>
    <a href="#" target="_blank">DISCORD</a>
    <a href="#" target="_blank">TELEGRAM</a>
  </div>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 10}s;
    `;
    container.appendChild(p);
  }
</script>

</body>
</html>
